<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlock Dana Kaget</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,.12);
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 16px;
      color: #666;
      font-size: 16px;
      line-height: 1.5;
    }

    .question-title {
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    pre {
      margin: 0;
      background: #f1f5f9;
      padding: 16px;
      border-radius: 14px;
      text-align: left;
      overflow-x: auto;
      white-space: pre;
      font-size: 13px;
      line-height: 1.6;
      font-family: Consolas, Monaco, monospace;
      color: #111827;
    }

    input {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 18px;
      text-align: center;
      outline: none;
    }

    input:focus {
      border-color: #16a34a;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #86efac;
      cursor: not-allowed;
    }

    .loading {
      margin-top: 14px;
      color: #15803d;
      font-size: 14px;
      display: none;
    }

    .error {
      margin-top: 14px;
      color: #dc2626;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>💸 Unlock Dana Kaget</h2>

  <div class="subtitle">
    Mau daget? Pemanasan otak dulu yaa 🤣
  </div>

  <div class="question-title">
    🧠 Berapa hasil output berikut?
  </div>

  <pre id="question"></pre>

  <input
    type="number"
    id="password"
    placeholder="Jawab di sini ya bree"
    inputmode="numeric"
  >

  <button id="unlockBtn">
    UNLOCK
  </button>

  <div class="loading" id="loading">
    ⏳ Menghubungkan ke server rejeki...
  </div>

  <div class="error" id="error">
    ❌ Jawaban salah bree, refresh dulu buat gacha soal baru 😭
  </div>

</div>

<script>

const danaLink =
  "https://link.dana.id/danakaget?c=ISI_LINK_DANA_KAMU";

const questions = [
{
code: `let x = 2;
let y = 3;
let z = 4;

let hasil = x ** y + z * 2 - 1;

console.log(hasil);`,
answer: 15
},

{
code: `let hearts = 3;
let bonus = 2;

hearts += bonus;

let total = hearts ** bonus;

console.log(total);`,
answer: 25
},

{
code: `let a = 10;
let b = 4;

a = a - b;
b = a + b;

console.log(a * b);`,
answer: 60
},

{
code: `let fans = 2;

fans = fans ** 3;
fans = fans / 2 + 2;

console.log(fans);`,
answer: 6
},

{
code: `let bias = 2;
let comeback = 3;
let stage = 2;

let result = (bias + stage) ** comeback - stage;

console.log(result);`,
answer: 62
},

{
code: `let x = 5;

x += 3;
x *= 2;
x -= 4;

console.log(x);`,
answer: 12
},

{
code: `let a = 3;
let b = 2;

let result = a ** b + b ** a;

console.log(result);`,
answer: 17
}
];

const randomQuestion =
  questions[Math.floor(Math.random() * questions.length)];

document.getElementById("question").textContent =
  randomQuestion.code;

const button = document.getElementById("unlockBtn");

button.addEventListener("click", unlock);

document
  .getElementById("password")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      unlock();
    }
  });

function unlock() {

  const input =
    document.getElementById("password").value;

  const error =
    document.getElementById("error");

  const loading =
    document.getElementById("loading");

  error.style.display = "none";

  if (Number(input) === randomQuestion.answer) {

    button.disabled = true;
    button.innerText = "PROCESSING...";
    loading.style.display = "block";

    setTimeout(() => {
      window.location.href = danaLink;
    }, 1500);

  } else {
    error.style.display = "block";
  }
}

</script>

</body>
</html>
